name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_API: ${{ secrets.DOCKER_REGISTRY }}/mlops-heart-disease-api:latest
  IMAGE_STREAMLIT: ${{ secrets.DOCKER_REGISTRY }}/mlops-heart-disease-streamlit:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ env.IMAGE_API }}
      - name: Build and push Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.streamlit
          push: true
          tags: ${{ env.IMAGE_STREAMLIT }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      - name: Create kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > "$GITHUB_WORKSPACE/kubeconfig"
        env:
          KUBECONFIG: ${{ github.workspace }}/kubeconfig
      - name: Render Kubernetes manifest
        run: |
          envsubst < k8s-deployment.yaml > k8s-deployment-resolved.yaml
        env:
          IMAGE_API: ${{ env.IMAGE_API }}
          IMAGE_STREAMLIT: ${{ env.IMAGE_STREAMLIT }}
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s-deployment-resolved.yaml
