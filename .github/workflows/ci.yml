name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Lint code
        run: |
          python -m pip install ruff
          ruff check .
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          cd "$GITHUB_WORKSPACE"
          python -m pytest tests -q
      - name: Train model
        env:
          PYTHONPATH: ${{ github.workspace }}
          MLFLOW_TRACKING_URI: file:./mlruns-ci
        run: |
          cd "$GITHUB_WORKSPACE"
          python -m src.train
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: models/model.joblib
      - name: Upload MLflow run data
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns-ci
      - name: Upload MLflow auxiliary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-auxiliary-artifacts
          path: artifacts/mlflow
