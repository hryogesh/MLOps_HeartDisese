name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint code
        run: |
          python -m pip install ruff
          ruff check .
      - name: Run tests
        run: |
          pytest -q
      - name: Train model
        run: |
          python -m src.train
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-artifact
          path: models/model.joblib
      - name: Upload MLflow run data
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts
          path: mlruns
      - name: Upload MLflow auxiliary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-auxiliary-artifacts
          path: artifacts/mlflow
